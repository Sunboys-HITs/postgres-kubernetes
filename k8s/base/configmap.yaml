apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: infra
  labels:
    app.kubernetes.io/name: postgres
data:
  01-ensure-databases.sh: |
    #!/usr/bin/env sh
    set -eu

    psql \
      -v ON_ERROR_STOP=1 \
      -v app_db_user="$APP_DB_USER" \
      -v app_db_password="$APP_DB_PASSWORD" \
      --username "$POSTGRES_USER" \
      --dbname "$POSTGRES_DB" <<-SQL
      SELECT format(
        'CREATE ROLE %I LOGIN PASSWORD %L',
        :'app_db_user',
        :'app_db_password'
      )
      WHERE NOT EXISTS (
        SELECT FROM pg_catalog.pg_roles WHERE rolname = :'app_db_user'
      ) \gexec

      SELECT format(
        'ALTER ROLE %I LOGIN PASSWORD %L NOSUPERUSER NOCREATEDB NOCREATEROLE NOREPLICATION',
        :'app_db_user',
        :'app_db_password'
      ) \gexec
    SQL

    for db in $(printf '%s' "$SERVICE_DATABASES" | tr ',' ' '); do
      psql \
        -v ON_ERROR_STOP=1 \
        -v app_db_user="$APP_DB_USER" \
        -v db_name="$db" \
        --username "$POSTGRES_USER" \
        --dbname "$POSTGRES_DB" <<-SQL
        SELECT format(
          'CREATE DATABASE %I OWNER %I',
          :'db_name',
          :'app_db_user'
        )
        WHERE NOT EXISTS (
          SELECT FROM pg_catalog.pg_database WHERE datname = :'db_name'
        ) \gexec

        SELECT format(
          'ALTER DATABASE %I OWNER TO %I',
          :'db_name',
          :'app_db_user'
        ) \gexec
      SQL
    done
